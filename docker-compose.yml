services:
  db:
    image: postgres:14-alpine
    container_name: pantau_cabai_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
      POSTGRES_DB: pantau_cabai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: pantau_cabai_api
    environment:
      DATABASE_URL: "postgresql://postgres:12345678@db:5432/pantau_cabai"
      HTTPS : true
      FORWARD_ALLOW_IPS: "*"  
      SECRET_KEY: super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      UPLOAD_DIR: uploads
      MAIL_SERVER: smtp.gmail.com
      MAIL_PORT: 587
      MAX_FILE_SIZE: 5242880
      THUMBNAIL_SIZE: "(300,300)"
    ports:
      - "8001:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"

volumes:
  postgres_data:
